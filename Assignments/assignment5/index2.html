<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Replicate</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:yellow;
    font-family:"Times New Roman", serif;
}

h1{
    text-align:center;
    font-size:60px;
    margin:30px 0 50px;
}

.container{
    width:800px;
    margin:auto;
}

.row{
    display:flex;
    align-items:center;
    gap:60px;
    margin:50px 0;
}

.number{
    width:50px;
    font-size:30px;
    font-weight:bold;
}

.box{
    width:120px;
    height:120px;
    background:green;
}

/* Box 1 & 3 */
@keyframes horizontal{
    0%,100%{
        transform:scaleX(1);
    }
    50%{
        transform:scaleX(2);
    }
}

.horizontal{
    animation:horizontal 2s ease-in-out infinite;
    transform-origin:left center;
}

/* Box 2 */
@keyframes bothDirections{
    0%{
        transform:scale(1);
    }

    25%{
        transform:scaleX(1.5) scaleY(1.2);
    }

    50%{
        transform:scaleX(2) scaleY(1.8);
    }

    75%{
        transform:scaleX(1.5) scaleY(1.2);
    }

    100%{
        transform:scale(1);
    }
}

.both{
    animation:bothDirections 2s ease-in-out infinite;
    transform-origin:center center;
}

/* Static Boxes */
.static{
    background:green;
}

.link{
    text-align:center;
    margin:60px 0;
}

.link a{
    font-size:30px;
    color:blue;
    font-weight:bold;
}
</style>
</head>
<body>

<h1>Try to replicate this</h1>

<div class="container">

    <!-- 1 -->
    <div class="row">
        <div class="number">1.</div>
        <div class="box horizontal"></div>
    </div>

    <!-- 2 -->
    <div class="row">
        <div class="number">2.</div>
        <div class="box both"></div>
    </div>

    <!-- 3 -->
    <div class="row">
        <div class="number">3.</div>
        <div class="box horizontal"></div>
    </div>

    <!-- 4 -->
    <div class="row">
        <div class="number">4.</div>
        <div class="box static"></div>
    </div>

    <!-- 5 -->
    <div class="row">
        <div class="number">5.</div>
        <div class="box static"></div>
    </div>

    <!-- 6 -->
    <div class="row">
        <div class="number">6.</div>
        <div class="box static"></div>
    </div>

</div>

<div class="link">
    <a href="#">NEXT</a>
</div>

</body>
</html>
